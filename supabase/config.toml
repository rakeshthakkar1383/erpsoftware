# Supabase project configuration
# Generated by supabase CLI, customize as needed

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "auth"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
schema = "public"
major_version = 15

[db.pooler]
enabled = true
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.extensions]
pgcrypto = { schema = "extensions", version = "1.3" }
pgjwt = { schema = "extensions", version = "0.2" }
uuid-ossp = { schema = "extensions", version = "1.1" }

[realtime]
enabled = true
max_subscribers = 1000

[auth]
enabled = true
enable_signup = false
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_identity_providers = false

[auth.session]
timebox_migrations = false
inactivity_timeout = 86400

[auth.email]
enable_confirmations = false
enable_autoconfirm = true
double_confirm_changes = true
enable_anonymous_sign_ins = false
min_password_length = 6

[auth.sms]
enable_confirmations = false
enable_autoconfirm = true
template = "Your verification code is {{ .Code }}"

[auth.mfa]
enabled = true
max_enrolled_factors = 10
enrollment_policy = "optional"

[auth.mfa.totp]
enroll_template = "Enter code: {{ .Code }}"
verify_template = "Enter code: {{ .Code }}"

[auth.mfa.phone]
enroll_template = "Enter code: {{ .Code }}"
verify_template = "Enter code: {{ .Code }}"

[auth.captcha]
enabled = false
provider = "hcaptcha"

[auth.external]
enabled = false

[auth.external.apple]
enabled = false

[auth.external.azure]
enabled = false

[auth.external.bitbucket]
enabled = false

[auth.external.discord]
enabled = false

[auth.external.facebook]
enabled = false

[auth.external.figma]
enabled = false

[auth.external.github]
enabled = false

[auth.external.gitlab]
enabled = false

[auth.external.google]
enabled = false

[auth.external.kakao]
enabled = false

[auth.external.keycloak]
enabled = false

[auth.external.linkedin]
enabled = false

[auth.external.notion]
enabled = false

[auth.external.spotify]
enabled = false

[auth.external.slack]
enabled = false

[auth.external.twitch]
enabled = false

[auth.external.twitter]
enabled = false

[auth.external.workos]
enabled = false

[auth.external.zoom]
enabled = false

[edge_runtime]
enabled = true
policy = "per_worker"

[functions]
enabled = true

[analytics]
enabled = true
port = 54323
vector_port = 54324

[storage]
enabled = true

[[storage.buckets]]
name = "school-files"
public = true
file_size_limit = 5242880
allowed_mime_types = ["image/jpeg", "image/jpg", "image/png", "image/gif", "image/webp", "application/pdf"]
